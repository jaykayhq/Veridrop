[build]
  base = "veridrop-web"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"

# Explicitly enable the Netlify Next.js plugin for auto-deploys
[[plugins]]
  package = "@netlify/plugin-nextjs"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-store"

[[redirects]]
  from = "/api/*"
  to = "/api/:splat"
  status = 200
